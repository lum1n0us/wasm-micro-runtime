name: Linux

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch
on:
  push:
    paths-ignore:
    - 'doc/**'
  pull_request:
    paths-ignore:
    - 'doc/**'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-20.10]
    steps:
    - uses: actions/checkout@v2

    - name: Build iwasm [default]
      run: |
        cd product-mini/platforms/linux
        mkdir build && cd build
        cmake ..
        make
        cd .. && rm -rf build
    - name: Build iwasm [Classic interp]
      run: |
        cd product-mini/platforms/linux
        mkdir build && cd build
        cmake .. -DWAMR_BUILD_FAST_INTERP=0
        make
        cd .. && rm -rf build
    - name: Build iwasm [Multi module]
      run: |
        cd product-mini/platforms/linux
        mkdir build && cd build
        cmake .. -DWAMR_BUILD_MULTI_MODULE=1
        make
        cd .. && rm -rf build
    - name: Build iwasm [lib-pthread]
      run: |
        cd product-mini/platforms/linux
        mkdir build && cd build
        cmake .. -DWAMR_BUILD_LIB_PTHREAD=1
        make
        cd .. && rm -rf build
    - name: Build iwasm [aot only]
      run: |
        cd product-mini/platforms/linux
        mkdir build && cd build
        cmake .. -DWAMR_BUILD_AOT=1 -DWAMR_BUILD_INTERP=0
        make
        cd .. && rm -rf build
    - name: Build iwasm [interp only]
      run: |
        cd product-mini/platforms/linux
        mkdir build && cd build
        cmake .. -DWAMR_BUILD_AOT=0
        make
        cd .. && rm -rf build
    - name: Build iwasm [memory profiling]
      run: |
        cd product-mini/platforms/linux
        mkdir build && cd build
        cmake .. -DWAMR_BUILD_MEMORY_PROFILING=1
        make
        cd .. && rm -rf build
    - name: Build iwasm [tail call]
      run: |
        cd product-mini/platforms/linux
        mkdir build && cd build
        cmake .. -DWAMR_BUILD_TAIL_CALL=1
        make
        cd .. && rm -rf build
    - name: Build iwasm [custom name section]
      run: |
        cd product-mini/platforms/linux
        mkdir build && cd build
        cmake .. -DWAMR_BUILD_CUSTOM_NAME_SECTION=1
        make
        cd .. && rm -rf build
    - name: download llvm and clang release
      run: |
        cd /opt
        wget https://github.com/llvm/llvm-project/releases/download/llvmorg-11.1.0/clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-20.10.tar.xz
        tar -xzf clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-20.10.tar.xz
        ln -sf clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-20.10 clang_llvm
        export PATH="/opt/clang_llvm/bin/:${PATH}"
        rm clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-20.10.tar.xz
    - name: Build wamrc
      run: |
        cd wamr-compiler
        mkdir build && cd build
        cmake ..
        make
        cd ..
    - name: download and install wasi-sdk
      run: |
        cd /opt
        wget https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-12/wasi-sdk-12.0-linux.tar.gz
        tar -xzf wasi-sdk-12.0-linux.tar.gz
        mv wasi-sdk-12.0 wasi-sdk
        rm wasi-sdk-12.0-linux.tar.gz
    - name: download and install wabt
      run: |
        cd /opt
        wget https://github.com/WebAssembly/wabt/releases/download/1.0.23/wabt-1.0.23-ubuntu.tar.gz
        tar -xzf wabt-1.0.23-ubuntu.tar.gz
        mv wabt-1.0.23 wabt
        rm wabt-1.0.23-ubuntu.tar.gz
    - name: Build Sample [wasm-c-api]
      run: |
        cd samples/wasm-c-api
        mkdir build && cd build
        cmake ..
        make
        ./callback
        ./calllback_chain
        ./global
        ./hello
        ./reflect
        ./trap
    - name: Build Sample [wasm-c-api] [Jit]
      run: |
        cd samples/wasm-c-api
        mkdir build && cd build
        cmake -DWAMR_BUILD_INTERP=0 -DWAMR_BUILD_JIT=1 -DWAMR_BUILD_AOT=1 ..
        make
        ./callback
        ./calllback_chain
        ./global
        ./hello
        ./reflect
        ./trap
    - name: Build Sample [wasm-c-api] [Aot]
      run: |
        cd samples/wasm-c-api
        mkdir build && cd build
        cmake -DWAMR_BUILD_INTERP=0 -DWAMR_BUILD_JIT=0 -DWAMR_BUILD_AOT=1 ..
        make
        ./callback
        ./calllback_chain
        ./global
        ./hello
        ./reflect
        ./trap
    - name: Build Sample [basic]
      run: |
        cd samples/basic
        ./build.sh
        ./run.sh
    - name: Build Sample [multi-thread]
      run: |
        cd samples/multi-thread
        mkdir build && cd build
        cmake ..
        make
        ./iwasm wasm-apps/test.wasm
    - name: Build Sample [multi-module]
      run: |
        cd samples/multi-module
        mkdir build && cd build
        cmake ..
        make
        ./multi_module
    - name: Build Sample [spawn-thread]
      run: |
        cd samples/spawn-thread
        mkdir build && cd build
        cmake ..
        make
        ./spawn_thread
